name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements_win.txt

      - name: Compilar con PyInstaller (onedir)
        run: pyinstaller CPMMonitor_win.spec --clean --noconfirm

      - name: Instalar Inno Setup
        run: choco install innosetup --no-progress -y
        shell: powershell

      - name: Crear instalador con Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        shell: powershell

      - name: Subir instalador como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: CPMMonitor-Installer
          path: Output\CPMMonitor_Setup_v4.5.exe
          retention-days: 30

      - name: Crear Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output\CPMMonitor_Setup_v4.5.exe
          name: CPM Monitor ${{ github.ref_name }}
          body: |
            ## CPM Monitor ${{ github.ref_name }} — Windows

            ### Instalación
            1. Descarga `CPMMonitor_Setup_v4.5.exe`
            2. Ejecuta el instalador (si SmartScreen lo bloquea → "Más información" → "Ejecutar de todas formas")
            3. Ingresa con las credenciales que recibiste por correo

            ### Novedades v4.5
            - Catálogo CPM funcional — match ISRC automático con plays
            - Scanner YouTube mejorado — sin acceso al micrófono
            - Logo oficial CPM Tracks
            - Porcentaje de reproducción correcto
            - Panel y mensajes abren correctamente desde el menú
